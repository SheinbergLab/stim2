name: Release for macOS

on:
  push:
    tags:
      - '*'

jobs:

  release-stim2:

    # Build on not-the-latest to keep dependency versions modest.
    runs-on: macos-14

    permissions:
      contents: write

    steps:

      - name: Install cmake build tool and dependencies.
        run: |
          brew update
          brew install cmake dylibbundler tcl-tk@9 glm ffmpeg jq

      - name: Check out our code
        uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0

      - name: Build and install GLFW static lib
        run: |
          cd deps/glfw/
          cmake -B build-full-static -D GLFW_BUILD_WAYLAND=ON -D GLFW_BUILD_X11=ON
          cmake --build build-full-static --parallel
          sudo cmake --install build-full-static

      - name: Build and install spine-c runtime library
        run: |
          cd deps/spine-runtimes/spine-c/
          cmake -B build -D CMAKE_POSITION_INDEPENDENT_CODE=ON
          cmake --build build --parallel
          cmake --install build --prefix ./build
          sudo mkdir -p /usr/local/include/spine/
          sudo cp ./build/dist/include/*.h /usr/local/include/spine/
          sudo cp ./build/dist/lib/*.a /usr/local/lib

      - name: Build Box2D from source and install
        run: |
          cd deps/box2d
          mkdir build && cd build
          cmake -DCMAKE_BUILD_TYPE=Release -DBOX2D_BUILD_UNIT_TESTS=OFF -DBOX2D_BUILD_TESTBED=OFF -DBUILD_SHARED_LIBS=OFF ..
          cmake --build . --config Release
          sudo make install
    
      - name: Install our dg and dlsh libs and headers into the build environment.
        run: |
          # Get latest dlsh version from SheinbergLab (using token to avoid rate limits)
          DLSH_VERSION=$(curl -s -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" https://api.github.com/repos/SheinbergLab/dlsh/releases/latest | jq -r '.tag_name')
          echo "Using dlsh version: $DLSH_VERSION"
          
          wget https://github.com/SheinbergLab/dlsh/releases/download/${DLSH_VERSION}/dlsh-${DLSH_VERSION}-Darwin-arm64-signed.pkg
          sudo installer -pkg dlsh-${DLSH_VERSION}-Darwin-arm64-signed.pkg -target /

          # The .pkg installs libs/headers only. Also fetch the dlsh.zip VFS and
          # place it at /usr/local/dlsh/dlsh.zip, which is where the app build
          # bundles it from (DLSH_ZIP default in CMakeLists.txt) and the runtime
          # fallback location.
          wget https://github.com/SheinbergLab/dlsh/releases/download/${DLSH_VERSION}/dlsh-${DLSH_VERSION}.zip
          sudo mkdir -p /usr/local/dlsh
          sudo cp dlsh-${DLSH_VERSION}.zip /usr/local/dlsh/dlsh.zip
          echo "${DLSH_VERSION}" | sudo tee /usr/local/dlsh/VERSION
      - name: Build our stimdlls to include within the stim2 app bundle.
        run: |
          cd stimdlls
          cmake -B build -G Xcode -D CMAKE_OSX_DEPLOYMENT_TARGET="14.0"
          cmake --build build --parallel --config Release

      - name: Set up a keychain for Apple code signing.
        env:
          CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.APPLE_KEYCHAIN_PASSWORD }}
          APP_CERTIFICATE_BASE64: ${{ secrets.APPLE_APP_CERTIFICATE_BASE64 }}
        run: |
          # Reconstitute text-encoded secrets as binary .p12 files.
          APP_CERTIFICATE_PATH=$RUNNER_TEMP/developerID_application.p12
          echo -n "$APP_CERTIFICATE_BASE64" | base64 --decode -o "$APP_CERTIFICATE_PATH"

          # Create a new keychain for use in CI.
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Add our certificates to the keychain.
          security import "$APP_CERTIFICATE_PATH" -P "$CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"

          # Alow codesign util and the current user to use this keychain for signing.
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"

          # Log info about this keychain for debuging.
          security find-identity -p basic -v

      - name: Build, sign, package, and notarize stim2.
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          cmake -B build -G Xcode -D CMAKE_XCODE_ATTRIBUTE_DEVELOPMENT_TEAM="$TEAM_ID" -D PROJECT_VERSION=${{ github.ref_name }}
          cmake --build build --config Release
          cpack -G DragNDrop --config build/CPackConfig.cmake

          # Guard the self-contained property before we notarize/release.
          APP=build/Release/stim2.app
          BIN="$APP/Contents/MacOS/stim2"
          echo "== verifying self-contained app bundle =="

          # 1. dlsh.zip must be bundled in Resources (NOT MacOS -- a data file
          #    in Contents/MacOS breaks code signing/notarization).
          if [ ! -f "$APP/Contents/Resources/dlsh.zip" ]; then
            echo "FAIL: dlsh.zip is not bundled in Contents/Resources"; exit 1
          fi
          if [ -f "$APP/Contents/MacOS/dlsh.zip" ]; then
            echo "FAIL: dlsh.zip is in Contents/MacOS (will break notarization)"; exit 1
          fi

          # 2. The libuv->kqueue migration must hold: no libuv anywhere.
          if otool -L "$BIN" | grep -qi libuv; then
            echo "FAIL: stim2 still links libuv:"; otool -L "$BIN"; exit 1
          fi
          if ls "$APP"/Contents/Frameworks/libuv* >/dev/null 2>&1; then
            echo "FAIL: libuv is bundled in Frameworks (kqueue migration regressed)"; exit 1
          fi

          # 3. No Homebrew or /usr/local dependencies in any bundled binary.
          leak=0
          for f in "$BIN" "$APP"/Contents/Frameworks/*.dylib "$APP"/Contents/MacOS/stimdlls/*.dylib; do
            [ -e "$f" ] || continue
            dep=$(otool -L "$f" 2>/dev/null | tail -n +2 | grep -iE "/usr/local|/opt/(home|local)" || true)
            if [ -n "$dep" ]; then echo "FAIL: external dep in $(basename "$f"):"; echo "$dep"; leak=1; fi
          done
          [ "$leak" -eq 0 ] || exit 1
          echo "OK: dlsh.zip bundled, no libuv, no /usr/local or /opt deps"

          xcrun notarytool store-credentials --apple-id "$APPLE_ID" --team-id "$TEAM_ID" --password "$APPLE_APP_PASSWORD" "stim2-signing"
          xcrun notarytool submit stim2-${{ github.ref_name }}-Darwin.dmg --keychain-profile "stim2-signing" --wait
          xcrun stapler staple stim2-${{ github.ref_name }}-Darwin.dmg

      - name: Create a GitHub release for the current tag and package.
        uses: ncipollo/release-action@v1
        with:
          artifacts: "./*.dmg"
          body: stim2 version ${{ github.ref_name }}
          generateReleaseNotes: true
          allowUpdates: true
          # Build into a prerelease so the tag is never returned by
          # /releases/latest while artifacts are still uploading. The publish
          # workflow flips this to a full release once all platforms succeed.
          # omitPrereleaseDuringUpdate keeps re-runs from reverting a published
          # release back to prerelease.
          prerelease: true
          omitPrereleaseDuringUpdate: true

  check-stim2:

    needs: release-stim2

    # Check on latest to confirm compatibility.
    runs-on: macos-15

    steps:

      - name: Install coreutils with timeout util.
        run: |
          brew update
          brew install coreutils

      - name: Install the stim2 package we just released.
        run: |
          wget ${{ github.server_url }}/${{ github.repository }}/releases/download/${{ github.ref_name }}/stim2-${{ github.ref_name }}-Darwin.dmg
          hdiutil attach stim2-${{ github.ref_name }}-Darwin.dmg
          cp -R /Volumes/stim2-${{ github.ref_name }}-Darwin/stim2.app /Applications
          hdiutil unmount /Volumes/stim2-${{ github.ref_name }}-Darwin

      - name: Sanity check the installed stim2.
        run: |
          # This is a clean runner with no /usr/local/dlsh, so a successful run
          # proves the app loads dlsh from its bundled copy (the self-contained
          # fallback path).
          if [ -e /usr/local/dlsh ]; then
            echo "FAIL: /usr/local/dlsh exists on this runner; cannot prove bundled fallback"; exit 1
          fi
          if [ ! -f /Applications/stim2.app/Contents/Resources/dlsh.zip ]; then
            echo "FAIL: shipped app is missing the bundled Contents/Resources/dlsh.zip"; exit 1
          fi
          /Applications/stim2.app/Contents/MacOS/stim2 --help
          timeout --preserve-status --signal SIGINT 2 /Applications/stim2.app/Contents/MacOS/stim2 || echo "$?"
